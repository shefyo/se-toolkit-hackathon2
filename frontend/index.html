<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartReceipt - Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .input-section textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .input-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
        }

        .result-message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .result-message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .expenses-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .expenses-header h2 {
            color: #333;
            font-size: 1.5rem;
        }

        .refresh-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .refresh-btn:hover {
            background: #5568d3;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .expense-item:last-child {
            border-bottom: none;
        }

        .expense-info {
            flex: 1;
        }

        .expense-name {
            font-weight: 600;
            color: #333;
        }

        .expense-category {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }

        .expense-amount {
            font-weight: 700;
            color: #667eea;
            font-size: 1.2rem;
        }

        .expense-date {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧾 SmartReceipt</h1>

        <div class="card input-section">
            <textarea 
                id="expenseInput" 
                placeholder="Enter your expenses here...&#10;Example: I bought coffee for 5 and pizza for 10"
            ></textarea>
            <button class="submit-btn" id="submitBtn" onclick="submitExpenses()">
                💰 Parse & Save Expenses
            </button>
            <div id="resultMessage" class="result-message"></div>
        </div>

        <div class="card">
            <div class="expenses-header">
                <h2>📋 Expense History</h2>
                <button class="refresh-btn" onclick="loadExpenses()">Refresh</button>
            </div>
            <div id="expensesList">
                <div class="loading">Loading expenses...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function submitExpenses() {
            const text = document.getElementById('expenseInput').value.trim();
            const btn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('resultMessage');

            if (!text) {
                resultDiv.className = 'result-message error';
                resultDiv.textContent = 'Please enter some text with expenses.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                const response = await fetch(`${API_URL}/parse-expenses`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (data.saved && data.saved.length > 0) {
                    resultDiv.className = 'result-message success';
                    resultDiv.textContent = data.message;
                    document.getElementById('expenseInput').value = '';
                    loadExpenses();
                } else {
                    resultDiv.className = 'result-message error';
                    resultDiv.textContent = data.message || 'No expenses found.';
                }
            } catch (error) {
                resultDiv.className = 'result-message error';
                resultDiv.textContent = 'Error connecting to server.';
            } finally {
                btn.disabled = false;
                btn.textContent = '💰 Parse & Save Expenses';
            }
        }

        async function loadExpenses() {
            const listDiv = document.getElementById('expensesList');
            listDiv.innerHTML = '<div class="loading">Loading expenses...</div>';

            try {
                const response = await fetch(`${API_URL}/expenses`);
                const expenses = await response.json();

                if (expenses.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">No expenses yet. Add your first expense above!</div>';
                    return;
                }

                let html = '';
                expenses.forEach(exp => {
                    const date = new Date(exp.created_at).toLocaleString();
                    html += `
                        <div class="expense-item">
                            <div class="expense-info">
                                <div class="expense-name">${escapeHtml(exp.item)}</div>
                                <div class="expense-category">${escapeHtml(exp.category)}</div>
                                <div class="expense-date">${date}</div>
                            </div>
                            <div class="expense-amount">$${parseFloat(exp.amount).toFixed(2)}</div>
                        </div>
                    `;
                });

                listDiv.innerHTML = html;
            } catch (error) {
                listDiv.innerHTML = '<div class="empty-state">Error loading expenses.</div>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load expenses on page load
        document.addEventListener('DOMContentLoaded', loadExpenses);
    </script>
</body>
</html>
